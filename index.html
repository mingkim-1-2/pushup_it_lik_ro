<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>푸시업 자세 측정기 (프레임 잠금 버전)</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.3/dist/teachablemachine-image.min.js"></script>

<style>
*, *::before, *::after {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #f0f4f8; 
    color: #1e293b; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    overflow: hidden;
}

#homePage {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
}

.helpBox {
    width: 550px;
    padding: 40px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(160, 175, 192, 0.3);
    text-align: center;
}

.helpBox h1 {
    font-size: 34px;
    color: #2b4c7e;
    margin-bottom: 20px;
}

.helpBox p {
    font-size: 17px;
    color: #4a5568;
    line-height: 1.8;
    margin-bottom: 35px;
    word-break: keep-all;
}

button {
    width: 200px;
    height: 60px;
    font-size: 18px;
    font-weight: bold;
    color: white;
    background: #3b82f6; 
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
}

button:hover {
    background: #2563eb;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
}

#exercisePage {
    display: none;
    width: 100vw;
    height: 100vh;
    flex-direction: row;
}

.videoArea {
    flex: 1; 
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 25px;
    background: #e2e8f0; 
}

#canvas {
    width: 720px;
    height: 480px;
    border-radius: 20px;
    box-shadow: 0 20px 45px rgba(0, 0, 0, 0.1);
    background: #ffffff;
    object-fit: cover; 
}

.sidePanel {
    width: 340px; 
    background: #ffffff;
    border-left: 1px solid #e2e8f0;
    display: flex;
    flex-direction: column;
    padding: 24px;
    justify-content: space-between; 
}

.panelSection {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    margin-bottom: 14px;
    padding: 18px;
    text-align: center;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.panelSection:last-child {
    margin-bottom: 0;
}

.sidePanel h2 {
    font-size: 14px;
    color: #64748b;
    margin: 0 0 10px 0;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
}

#count {
    font-size: 64px; 
    font-weight: 800;
    color: #2563eb; 
    line-height: 1;
}

#state {
    font-size: 36px;
    font-weight: 700;
    color: #475569;
}

#result {
    font-size: 26px;
    font-weight: 700;
    color: #059669; 
}

#confidence {
    font-size: 36px;
    font-weight: 700;
    color: #0f172a;
}
</style>
</head>
<body>

<div id="homePage">
    <div class="helpBox">
        <h1>푸시업 자세 측정기</h1>
        <p>
            인공지능 이미지 인식 기술을 통해 실시간으로 푸시업 자세를 측정합니다. 정확한 자세를 유지하며 운동 효과를 극대화해 보세요!
        </p>
        <button onclick="startExercise()">측정 시작하기</button>
    </div>
</div>

<div id="exercisePage">
    <div class="videoArea">
        <canvas id="canvas"></canvas>
    </div>

    <div class="sidePanel">
        <div class="panelSection">
            <h2>정확한 자세 카운트</h2>
            <div id="count">0</div>
        </div>

        <div class="panelSection">
            <h2>현재 상태</h2>
            <div id="state">NONE</div>
        </div>

        <div class="panelSection">
            <h2>자세 판정</h2>
            <div id="result">인식 대기중</div>
        </div>

        <div class="panelSection">
            <h2>신뢰도</h2>
            <div id="confidence">0%</div>
        </div>
    </div>
</div>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/mLbKddnnv/";

let model, webcam, ctx, canvas;
let maxPredictions;
let count = 0;

// ⏱️ 디바운싱 변수 세팅
let tempState = "NONE";
let stableCount = 0;
let currentState = "NONE";
const REQUIRED_FRAMES = 10; // 🛠️ 중요: 연속으로 몇 프레임 유지되어야 바꿀지 설정 (기본 10프레임)

let cycleState = 0;

async function startExercise(){
    document.getElementById("homePage").style.display = "none";
    document.getElementById("exercisePage").style.display = "flex";
    await init();
}

async function init(){
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    webcam = new tmImage.Webcam(600, 400, true);
    await webcam.setup(); 
    await webcam.play();

    canvas = document.getElementById("canvas");
    canvas.width = 720;
    canvas.height = 480;
    ctx = canvas.getContext("2d");

    setTimeout(() => {
        window.requestAnimationFrame(loop);
    }, 100);
}

async function loop(){
    if (webcam && webcam.canvas) {
        webcam.update();
        await predict();
    }
    window.requestAnimationFrame(loop);
}

// 🛠️ 대폭 강화된 프레임 잠금 디바운싱 함수
function updateState(newState){
    // 들어온 가상의 신호(newState)가 직전 프레임의 가상 신호와 같다면 카운트 증가
    if(tempState === newState){
        stableCount++;
    } else {
        tempState = newState;
        stableCount = 1;
    }

    // 🔒 설정한 프레임(REQUIRED_FRAMES)을 완벽하게 연속으로 채워야만 실제 결과(currentState)를 교체!
    if(stableCount >= REQUIRED_FRAMES){
        currentState = tempState;
    }

    // 화면 UI 업데이트
    document.getElementById("state").innerHTML = currentState;
    if(currentState === "UP") {
        document.getElementById("result").innerHTML = "올바른 자세 (UP)";
        document.getElementById("result").style.color = "#2563eb";
    } else if(currentState === "DOWN") {
        document.getElementById("result").innerHTML = "올바른 자세 (DOWN)";
        document.getElementById("result").style.color = "#059669";
    } else {
        document.getElementById("result").innerHTML = "인식 안됨";
        document.getElementById("result").style.color = "#64748b";
    }
}

function updateCycle(){
    if(currentState === "NONE") return;

    if(cycleState === 0 && currentState === "UP"){
        cycleState = 1;
    }
    else if(cycleState === 1 && currentState === "DOWN"){
        cycleState = 2;
    }
    else if(cycleState === 2 && currentState === "UP"){
        count++;
        document.getElementById("count").innerHTML = count;
        cycleState = 1;
    }
}

async function predict(){
    if (!webcam || !webcam.canvas) return;

    const prediction = await model.predict(webcam.canvas);

    let upProb = 0;
    let downProb = 0;
    let noneProb = 0;

    // 1. Teachable Machine에서 클래스별 확률 수집
    for(let i = 0; i < maxPredictions; i++){
        let className = prediction[i].className.toLowerCase();
        
        if(className === "pushup_up"){
            upProb = prediction[i].probability;
        }
        else if(className === "pushup_down"){
            downProb = prediction[i].probability;
        }
        else if(className === "none"){
            noneProb = prediction[i].probability;
        }
    } // 👈 닫는 괄호를 이쪽으로 이동하여 for 루프를 여기서 끝냅니다.

    // 2. 의도하신 대로 레이블 교차 매핑 유지
    let weightedUp = upProb;   // UP 상태일 때 DOWN 레이블이 나오는 특성 반영
    let weightedNone = noneProb;
    let weightedDown = downProb;   // DOWN 상태일 때 UP 레이블이 나오는 특성 반영
    
    // 3. 현재 프레임의 최대 확률 계산 (이제 딱 한 번만 수행됩니다)
    let realMaxProb = Math.max(weightedUp, weightedDown, weightedNone);

    // 4. 신뢰도 화면 표시 (100%를 넘지 않고 정상 출력됩니다)
    const formattedProb = (realMaxProb * 100).toFixed(1);
    document.getElementById("confidence").innerHTML = `<span class="confidence-num">${formattedProb}</span>%`;

    // 5. 엄격한 조건 검증 및 상태 업데이트
    if (weightedUp > 0.7 && (weightedUp - weightedDown > 0.2)) {
        updateState("UP");
    }
    else if (weightedDown > 0.7 && (weightedDown - weightedUp > 0.2)) {
        updateState("DOWN");
    }
    else if (weightedNone > 0.7) {
        updateState("NONE");
    }
    else {
        document.getElementById("result").innerHTML = "자세 정밀 추적 중...";
        document.getElementById("result").style.color = "#f59e0b"; 
    }

    updateCycle();
    drawPose(); 
}

function drawPose(){
    if(webcam && webcam.canvas){
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(webcam.canvas, 0, 0, 720, 480);
    }
}
</script>

</body>
</html>
